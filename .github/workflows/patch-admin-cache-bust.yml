name: Patch admin cache bust

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch admin config script cache
        run: |
          python3 - <<'PY'
          from pathlib import Path

          admin = Path('public/admin.html')
          text = admin.read_text(encoding='utf-8')
          old = '/assets/admin/configs.js?v=20260522-i18n-emoji-global-toggle'
          new = '/assets/admin/configs.js?v=20260620-viameta-menu-text'
          if old not in text and new not in text:
              raise SystemExit('configs.js script tag not found')
          admin.write_text(text.replace(old, new), encoding='utf-8')

          workflow = Path('.github/workflows/patch-admin-cache-bust.yml')
          if workflow.exists():
              workflow.unlink()
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/admin.html .github/workflows/patch-admin-cache-bust.yml
          git commit -m "Bust admin config cache"
          git push
