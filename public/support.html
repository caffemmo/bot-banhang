<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hỗ trợ khách hàng</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #152033;
      --muted: #61708a;
      --line: #dbe4ef;
      --primary: #0b74de;
      --primary-dark: #0758aa;
      --soft: #eef6ff;
      --danger: #b42318;
      --ok: #047857;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      width: min(980px, calc(100% - 24px));
      margin: 24px auto;
      display: grid;
      gap: 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    h1, h2 { margin: 0 0 12px; }
    h1 { font-size: 26px; }
    h2 { font-size: 18px; }
    p { margin: 0 0 14px; color: var(--muted); line-height: 1.45; }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 700;
      font-size: 14px;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 11px 12px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }
    textarea { min-height: 130px; resize: vertical; }
    button {
      border: 0;
      border-radius: 6px;
      padding: 11px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
    }
    button:hover { background: var(--primary-dark); }
    button.secondary {
      background: var(--soft);
      color: var(--primary-dark);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .notice {
      display: none;
      padding: 12px;
      border-radius: 6px;
      margin-top: 12px;
      background: var(--soft);
      color: var(--primary-dark);
      white-space: pre-wrap;
    }
    .notice.error {
      background: #fff0f0;
      color: var(--danger);
    }
    .ticket-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--primary-dark);
      font-weight: 700;
      font-size: 13px;
    }
    .message {
      padding: 12px;
      border-radius: 8px;
      margin: 10px 0;
      border: 1px solid var(--line);
      background: #fff;
      white-space: pre-wrap;
    }
    .message.admin {
      background: #f0fff7;
      border-color: #b7ecd2;
    }
    .meta {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
      font-weight: 700;
    }
    .hidden { display: none; }
    @media (max-width: 720px) {
      main { margin: 12px auto; }
      .grid { grid-template-columns: 1fr; }
      .ticket-head { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel" id="create-panel">
      <h1>Hỗ trợ khách hàng</h1>
      <p>Chọn đúng loại hỗ trợ, gửi nội dung cần xử lý. Shop sẽ trả lời trong ticket này.</p>

      <form id="ticket-form">
        <label for="kind">Loại hỗ trợ</label>
        <select id="kind" name="kind" required>
          <option value="order">Hỗ trợ đơn hàng</option>
          <option value="meta_verified">Hỗ trợ lên tích xanh</option>
          <option value="facebook_unlock">Hỗ trợ mở khóa Facebook</option>
        </select>

        <div class="grid">
          <div>
            <label for="customer-name">Tên của bạn</label>
            <input id="customer-name" name="customer_name" placeholder="Tên hoặc nickname" />
          </div>
          <div>
            <label for="contact-method">Muốn nhận phản hồi ở đâu?</label>
            <select id="contact-method" name="contact_method" required>
              <option value="web">Web ticket</option>
              <option value="telegram">Telegram</option>
              <option value="zalo">Zalo cá nhân</option>
            </select>
          </div>
        </div>

        <label for="contact-value">Thông tin liên hệ</label>
        <input id="contact-value" name="contact_value" placeholder="@telegram, số Zalo hoặc ghi để trống nếu chỉ xem trên web" />

        <div class="grid">
          <div>
            <label for="order-ref">Mã đơn / nội dung chuyển khoản</label>
            <input id="order-ref" name="order_ref" placeholder="VD: QUY..." />
          </div>
          <div>
            <label for="facebook-ref">Link/UID Facebook</label>
            <input id="facebook-ref" name="facebook_ref" placeholder="Nếu liên quan Facebook" />
          </div>
        </div>

        <label for="message">Nội dung cần hỗ trợ</label>
        <textarea id="message" name="message" required placeholder="Mô tả rõ vấn đề để shop xử lý nhanh hơn"></textarea>

        <div class="actions">
          <button type="submit">Gửi yêu cầu</button>
          <button type="button" class="secondary" id="open-ticket-btn">Mở ticket đã có</button>
        </div>
        <div class="notice" id="form-notice"></div>
      </form>
    </section>

    <section class="panel hidden" id="ticket-panel">
      <div class="ticket-head">
        <div>
          <h2 id="ticket-title">Ticket</h2>
          <p id="ticket-desc"></p>
        </div>
        <span class="badge" id="ticket-status"></span>
      </div>
      <div id="messages"></div>
      <form id="message-form">
        <label for="reply-message">Nhắn thêm</label>
        <textarea id="reply-message" required placeholder="Bổ sung thông tin cho ticket"></textarea>
        <div class="actions">
          <button type="submit">Gửi thêm</button>
          <button type="button" class="secondary" id="copy-link-btn">Copy link ticket</button>
          <button type="button" class="secondary" id="new-ticket-btn">Tạo ticket mới</button>
        </div>
      </form>
      <div class="notice" id="ticket-notice"></div>
    </section>
  </main>

  <script>
    const kindLabels = {
      order: 'Hỗ trợ đơn hàng',
      meta_verified: 'Hỗ trợ lên tích xanh',
      facebook_unlock: 'Hỗ trợ mở khóa Facebook',
    };
    const createPanel = document.querySelector('#create-panel');
    const ticketPanel = document.querySelector('#ticket-panel');
    const ticketForm = document.querySelector('#ticket-form');
    const messageForm = document.querySelector('#message-form');
    const formNotice = document.querySelector('#form-notice');
    const ticketNotice = document.querySelector('#ticket-notice');
    let currentTicket = null;

    function showNotice(el, text, error = false) {
      el.textContent = text;
      el.classList.toggle('error', error);
      el.style.display = 'block';
    }

    function hideNotice(el) {
      el.textContent = '';
      el.style.display = 'none';
      el.classList.remove('error');
    }

    function params() {
      return new URLSearchParams(window.location.search);
    }

    function ticketLink(ticket) {
      const url = new URL(window.location.href);
      url.pathname = '/support';
      url.search = new URLSearchParams({ ticket: ticket.id, key: ticket.public_key }).toString();
      return url.toString();
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });
      const data = await res.json().catch(() => null);
      if (!res.ok || !data?.ok) {
        throw new Error(data?.error?.message || 'Có lỗi xảy ra');
      }
      return data.data;
    }

    function renderTicket(data) {
      currentTicket = data.ticket;
      createPanel.classList.add('hidden');
      ticketPanel.classList.remove('hidden');
      hideNotice(ticketNotice);
      document.querySelector('#ticket-title').textContent = `Ticket #${data.ticket.id}`;
      document.querySelector('#ticket-desc').textContent = kindLabels[data.ticket.kind] || 'Hỗ trợ';
      document.querySelector('#ticket-status').textContent = data.ticket.status;
      const messages = document.querySelector('#messages');
      messages.innerHTML = '';
      data.messages.forEach((message) => {
        const item = document.createElement('div');
        item.className = `message ${message.sender === 'admin' ? 'admin' : ''}`;
        const meta = document.createElement('span');
        meta.className = 'meta';
        meta.textContent = `${message.sender === 'admin' ? 'Shop' : 'Khách'} • ${new Date(message.created_at).toLocaleString('vi-VN')}`;
        const body = document.createElement('div');
        body.textContent = message.message;
        item.append(meta, body);
        messages.append(item);
      });
      if (data.ticket.status === 'closed') {
        messageForm.classList.add('hidden');
      } else {
        messageForm.classList.remove('hidden');
      }
      window.history.replaceState(null, '', ticketLink(data.ticket));
    }

    async function loadTicket(id, key) {
      const data = await api(`/api/support/tickets/${encodeURIComponent(id)}?key=${encodeURIComponent(key)}`);
      renderTicket(data);
    }

    ticketForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      hideNotice(formNotice);
      const form = new FormData(ticketForm);
      const payload = Object.fromEntries(form.entries());
      try {
        const data = await api('/api/support/tickets', {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        renderTicket(data);
        showNotice(ticketNotice, `Đã tạo ticket. Hãy lưu link này để xem phản hồi:\n${ticketLink(data.ticket)}`);
      } catch (err) {
        showNotice(formNotice, err.message, true);
      }
    });

    messageForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      hideNotice(ticketNotice);
      const text = document.querySelector('#reply-message').value.trim();
      if (!text || !currentTicket) return;
      try {
        const data = await api(`/api/support/tickets/${currentTicket.id}/messages?key=${encodeURIComponent(currentTicket.public_key)}`, {
          method: 'POST',
          body: JSON.stringify({ message: text }),
        });
        document.querySelector('#reply-message').value = '';
        renderTicket(data);
      } catch (err) {
        showNotice(ticketNotice, err.message, true);
      }
    });

    document.querySelector('#copy-link-btn').addEventListener('click', async () => {
      if (!currentTicket) return;
      await navigator.clipboard.writeText(ticketLink(currentTicket));
      showNotice(ticketNotice, 'Đã copy link ticket.');
    });

    document.querySelector('#new-ticket-btn').addEventListener('click', () => {
      currentTicket = null;
      ticketPanel.classList.add('hidden');
      createPanel.classList.remove('hidden');
      window.history.replaceState(null, '', '/support');
    });

    document.querySelector('#open-ticket-btn').addEventListener('click', async () => {
      const id = prompt('Nhập mã ticket');
      const key = prompt('Nhập key ticket');
      if (!id || !key) return;
      try {
        await loadTicket(id.trim(), key.trim());
      } catch (err) {
        showNotice(formNotice, err.message, true);
      }
    });

    const initial = params();
    if (initial.get('ticket') && initial.get('key')) {
      loadTicket(initial.get('ticket'), initial.get('key')).catch((err) => {
        showNotice(formNotice, err.message, true);
      });
    }
  </script>
</body>
</html>
